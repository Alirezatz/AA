name: TelegramDownloader-Ultimate

on:
  workflow_dispatch:
    inputs:
      telegram_links:
        description: '🔗 لینک پست‌های تلگرام (با فاصله جدا کنید)'
        required: true
        type: string
      split_threshold_mb:
        description: '📦 حداکثر حجم هر بخش (مگابایت)'
        required: false
        type: number
        default: 90
      proxy_count:
        description: '🔢 تعداد پروکسی سالم ذخیره شود'
        required: false
        type: number
        default: 5

jobs:
  harvest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📂 دریافت مخزن
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚡ نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq zip unzip bc aria2 p7zip-full

      # کش پروکسی‌های ذخیره‌شده
      - name: 💾 بازیابی کش پروکسی‌ها
        id: cache-proxy
        uses: actions/cache@v4
        with:
          path: .proxy_cache
          key: telegram-proxies-${{ hashFiles('.github/workflows/*.yml') }}-v2
          restore-keys: |
            telegram-proxies-

      - name: 🚀 کشف/تأیید چندین پروکسی فعال
        id: proxy
        run: |
          mkdir -p .proxy_cache
          PROXY_FILE=".proxy_cache/working_proxies.txt"
          NEEDED=${{ github.event.inputs.proxy_count }}
          FOUND=0
          SELECTED_LIST=()

          # اگر فایل پروکسی‌های کش وجود داشت، آن‌ها را تست کنیم
          if [ -f "$PROXY_FILE" ]; then
            echo "🔍 بررسی پروکسی‌های ذخیره‌شده..."
            while IFS= read -r proxy; do
              if curl -s -x "http://$proxy" --max-time 5 --connect-timeout 3 -k \
                'https://telegramdownloader.net/proxy.php' -X POST \
                -H 'Content-Type: application/x-www-form-urlencoded' \
                --data-raw 'telegram_link=https%3A%2F%2Ft.me%2Ftest' --compressed 2>/dev/null | grep -q '"success"'; then
                echo "✅ پروکسی سالم: $proxy"
                SELECTED_LIST+=("$proxy")
                FOUND=$((FOUND+1))
                if [ $FOUND -ge $NEEDED ]; then break; fi
              else
                echo "❌ پروکسی مرده: $proxy"
              fi
            done < "$PROXY_FILE"
          fi

          # اگر به اندازۀ کافی پیدا نشد، لیست جدید بگیریم
          if [ $FOUND -lt $NEEDED ]; then
            echo "🔍 دانلود لیست پروکسی جدید..."
            curl -s 'https://raw.githubusercontent.com/Ian-Lusule/Proxies/main/proxies/http.txt' | \
              grep -vE '^(0\.0\.0\.0|127\.0\.0\.1)' | head -1000 > proxy_list.txt

            # تست موازی با ۲۰ نخ هم‌زمان، اولین ۵ پروکسی سالم را بگیریم
            # هر پروکسی که جواب بدهد، در یک فایل موقت ثبت شود
            TEST_DIR=$(mktemp -d)
            cat proxy_list.txt | xargs -P 20 -I {} bash -c '
              proxy="{}"
              if curl -s -x "http://$proxy" --max-time 4 --connect-timeout 2 -k \
                "https://telegramdownloader.net/proxy.php" -X POST \
                -H "Content-Type: application/x-www-form-urlencoded" \
                --data-raw "telegram_link=https%3A%2F%2Ft.me%2Ftest" --compressed 2>/dev/null | grep -q "\"success\""; then
                echo "$proxy" >> '"$TEST_DIR"'/alive.txt
              fi
            ' 2>/dev/null

            # خواندن پروکسی‌های سالم به ترتیب (اولین‌هایی که جواب دادند)
            if [ -f "$TEST_DIR/alive.txt" ]; then
              while IFS= read -r proxy; do
                if [ $FOUND -lt $NEEDED ]; then
                  SELECTED_LIST+=("$proxy")
                  FOUND=$((FOUND+1))
                else
                  break
                fi
              done < "$TEST_DIR/alive.txt"
            fi
            rm -rf "$TEST_DIR"
          fi

          # اگر هیچ پروکسی پیدا نشد، اتصال مستقیم
          if [ $FOUND -eq 0 ]; then
            echo "DIRECT" > "$PROXY_FILE"
            echo "ℹ️ هیچ پروکسی سالمی پیدا نشد – استفاده از اتصال مستقیم"
          else
            # ذخیره لیست پروکسی‌های سالم برای کش
            printf "%s\n" "${SELECTED_LIST[@]}" > "$PROXY_FILE"
            echo "🎯 تعداد پروکسی سالم ذخیره‌شده: ${#SELECTED_LIST[@]}"
          fi

          # خروجی برای مراحل بعد: فایل حاوی پروکسی‌ها (یا DIRECT)
          echo "proxy_file=$PROXY_FILE" >> $GITHUB_OUTPUT

      - name: 📡 دانلود موازی لینک‌ها با fallback پروکسی
        id: download_all
        run: |
          LINKS="${{ github.event.inputs.telegram_links }}"
          PROXY_FILE="${{ steps.proxy.outputs.proxy_file }}"
          THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          mkdir -p downloads logs

          # توابع کمکی
          fix_url() { echo "$1" | sed 's/ /-/g; s/%20/-/g'; }
          safe_folder() { echo "$1" | sed 's/[<>:"|?*\\/@#\$%^&!~`+=;,.]/_/g; s/ /_/g; s/__*/_/g' | cut -c1-80; }
          sanitize_name() { echo "$1" | sed 's/%20/-/g; s/%40/@/g; s/[[:space:]]/-/g; s/--*/-/g; s/[^a-zA-Z0-9.@_-]//g'; }
          urlencode() { python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }

          # تابع دانلود یک لینک (با fallback پروکسی‌ها)
          download_one() {
            local TELEGRAM_LINK="$1"
            local INDEX="$2"
            local LOGFILE="logs/link_${INDEX}.log"
            exec 3>&1 4>&2
            exec > "$LOGFILE" 2>&1

            echo "شروع دانلود #$INDEX: $TELEGRAM_LINK"

            # خواندن پروکسی‌ها (هر خط یک پروکسی یا کلمۀ DIRECT)
            mapfile -t PROXIES < "$PROXY_FILE"

            DOWNLOAD_OK=false
            for PROXY in "${PROXIES[@]}"; do
              [ -z "$PROXY" ] && continue
              echo "🔄 تلاش با پروکسی: $PROXY"

              # دریافت لینک دانلود با پروکسی فعلی
              if [ "$PROXY" = "DIRECT" ]; then
                RESPONSE=$(curl -s -X POST \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  --data-raw "telegram_link=$TELEGRAM_LINK" \
                  --compressed https://telegramdownloader.net/proxy.php)
              else
                RESPONSE=$(curl -s -x "http://$PROXY" -X POST \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  --data-raw "telegram_link=$TELEGRAM_LINK" \
                  --compressed https://telegramdownloader.net/proxy.php)
              fi

              RAW_URL=$(echo "$RESPONSE" | jq -r '.data.data.link')
              ORIGINAL_NAME=$(echo "$RESPONSE" | jq -r '.data.data.file_name')

              if [ -z "$RAW_URL" ] || [ "$RAW_URL" = "null" ]; then
                echo "⚠️ دریافت لینک ناموفق، پروکسی بعدی..."
                continue
              fi

              CLEAN_NAME=$(sanitize_name "$ORIGINAL_NAME")
              FOLDER_NAME=$(safe_folder "${CLEAN_NAME%.*}")
              DOWNLOAD_DIR="downloads/$FOLDER_NAME"
              mkdir -p "$DOWNLOAD_DIR"

              echo "📥 دانلود فایل: $ORIGINAL_NAME"
              FIXED_URL=$(fix_url "$RAW_URL")

              # دانلود با aria2c (با پروکسی فعلی در صورت نیاز)
              ARIA2_OPTS=(--max-connection-per-server=8 --split=8 --min-split-size=5M
                          --max-tries=3 --retry-wait=3 --timeout=120 --connect-timeout=30
                          --allow-overwrite=true --auto-file-renaming=false --console-log-level=error
                          --dir="$DOWNLOAD_DIR" --out="$ORIGINAL_NAME")
              if [ "$PROXY" != "DIRECT" ]; then
                ARIA2_OPTS+=(--all-proxy="http://$PROXY")
              fi

              if aria2c "${ARIA2_OPTS[@]}" "$FIXED_URL"; then
                # موفقیت
                if [ "$ORIGINAL_NAME" != "$CLEAN_NAME" ]; then
                  mv "$DOWNLOAD_DIR/$ORIGINAL_NAME" "$DOWNLOAD_DIR/$CLEAN_NAME"
                fi
                FILE_SIZE=$(stat -c%s "$DOWNLOAD_DIR/$CLEAN_NAME")
                if [ "$FILE_SIZE" -lt 10000 ]; then
                  echo "❌ فایل خیلی کوچک است، پروکسی بعدی..."
                  rm -f "$DOWNLOAD_DIR/$CLEAN_NAME"
                  continue
                fi
                DOWNLOAD_OK=true
                break
              else
                echo "⚠️ دانلود ناموفق، پروکسی بعدی..."
                # پاکسازی فایل ناقص
                rm -f "$DOWNLOAD_DIR/$ORIGINAL_NAME" "$DOWNLOAD_DIR/$CLEAN_NAME"
              fi
            done

            if [ "$DOWNLOAD_OK" = false ]; then
              echo "FAILED:ALL_PROXIES" > "logs/status_${INDEX}.txt"
              exec 1>&3 2>&4
              return 1
            fi

            SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            echo "✅ دانلود شد: ${SIZE_MB} مگابایت - $CLEAN_NAME"

            # فشرده‌سازی با 7z در صورت بزرگ‌تر بودن از حد
            SPLIT_FILES=()
            LIMIT=$((THRESHOLD_MB * 1024 * 1024))
            if [ "$FILE_SIZE" -gt "$LIMIT" ] && [ "$THRESHOLD_MB" != "0" ]; then
              echo "✂️ تقسیم فایل با 7z به حجم ${THRESHOLD_MB}مگ..."
              ARCHIVE="${CLEAN_NAME}.7z"
              # 7z با حجم مشخص (بایت) تقسیم می‌کند: -v${THRESHOLD_MB}m
              7z a -v${THRESHOLD_MB}m "$DOWNLOAD_DIR/$ARCHIVE" "$DOWNLOAD_DIR/$CLEAN_NAME" >/dev/null
              if [ $? -eq 0 ]; then
                rm -f "$DOWNLOAD_DIR/$CLEAN_NAME"  # حذف فایل اصلی
                # قطعات تولیدشده: archive.7z.001, archive.7z.002, ...
                for part in "$DOWNLOAD_DIR/$ARCHIVE".*; do
                  SPLIT_FILES+=("$(basename "$part")")
                done
                # اگر فقط یک بخش تولید شد (حجم کمتر از حد) خود archive.7z است که پسوند .001 ندارد
                if [ ${#SPLIT_FILES[@]} -eq 0 ]; then
                  # ممکن است 7z یک فایل .7z بدون قطعه ساخته باشد
                  if [ -f "$DOWNLOAD_DIR/$ARCHIVE" ]; then
                    SPLIT_FILES+=("$ARCHIVE")
                  fi
                fi
              else
                echo "❌ خطا در فشرده‌سازی، فایل اصلی نگه داشته می‌شود."
                SPLIT_FILES=("$CLEAN_NAME")
              fi
            else
              SPLIT_FILES=("$CLEAN_NAME")
            fi

            # ساخت فایل لینک‌های گیت‌هاب
            GITHUB_LINKS_FILE="$DOWNLOAD_DIR/github_links.txt"
            ENCODED_FOLDER=$(urlencode "$FOLDER_NAME")
            > "$GITHUB_LINKS_FILE"
            for file in "${SPLIT_FILES[@]}"; do
              ENCODED_FILE=$(urlencode "$file")
              echo "https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/refs/heads/${BRANCH}/downloads/${ENCODED_FOLDER}/${ENCODED_FILE}" >> "$GITHUB_LINKS_FILE"
            done

            echo "SUCCESS" > "logs/status_${INDEX}.txt"
            exec 1>&3 2>&4
            return 0
          }

          # اجرای موازی همه لینک‌ها
          declare -a PIDS
          IFS=' ' read -ra LINKS_ARRAY <<< "$LINKS"
          TOTAL_LINKS=${#LINKS_ARRAY[@]}
          echo "🚀 شروع دانلود $TOTAL_LINKS لینک به‌صورت همزمان..."

          for i in "${!LINKS_ARRAY[@]}"; do
            INDEX=$((i + 1))
            download_one "${LINKS_ARRAY[$i]}" "$INDEX" &
            PIDS[$i]=$!
          done

          for pid in "${PIDS[@]}"; do
            wait "$pid"
          done

          SUCCESS=0
          FAIL=0
          for i in $(seq 1 $TOTAL_LINKS); do
            if [ -f "logs/status_${i}.txt" ]; then
              STATUS=$(cat "logs/status_${i}.txt")
              if [ "$STATUS" = "SUCCESS" ]; then
                SUCCESS=$((SUCCESS + 1))
              else
                FAIL=$((FAIL + 1))
              fi
            else
              FAIL=$((FAIL + 1))
            fi
          done

          echo "success_count=$SUCCESS" >> $GITHUB_OUTPUT
          echo "fail_count=$FAIL" >> $GITHUB_OUTPUT
          echo "📊 دانلودها تمام شدند: $SUCCESS موفق، $FAIL ناموفق"

      - name: 📤 انتشار در مخزن
        if: steps.download_all.outputs.success_count > 0
        run: |
          git config user.name "TelegramDownloader-bot"
          git config user.email "telegramdownloader@local"
          git fetch origin "${{ github.ref_name }}"
          git pull origin "${{ github.ref_name }}" --rebase || true
          git add downloads/ logs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "✅ تغییر تازه‌ای وجود ندارد"
            exit 0
          fi
          git commit -m "⬇️ فایل‌های دانلودشده از تلگرام [skip ci]"
          for attempt in 1 2 3; do
            if git push origin "${{ github.ref_name }}" 2>&1; then
              echo "✅ با موفقیت منتشر شد"
              break
            else
              if [ $attempt -lt 3 ]; then
                echo "⚠️ تلاش $attempt ناموفق، rebase و تکرار..."
                git pull origin "${{ github.ref_name }}" --rebase
                sleep 5
              else
                echo "❌ انتشار شکست خورد"
                exit 1
              fi
            fi
          done

      - name: 📋 گزارش نهایی
        if: always()
        run: |
          echo ""
          echo "┌──────────────────────────────────────────────┐"
          echo "│          Telegram Downloader Ultimate        │"
          echo "├──────────────────────────────────────────────┤"
          echo "│ ✅ دانلود موفق: ${{ steps.download_all.outputs.success_count }}"
          echo "│ ❌ ناموفق: ${{ steps.download_all.outputs.fail_count }}"
          echo "│ 📁 مسیر فایل‌ها: ./downloads/<folder>/"
          echo "│ 🗜️ فشرده‌سازی با 7z (حجم کمتر)"
          echo "│ 🔁 Fallback خودکار بین چند پروکسی"
          echo "└──────────────────────────────────────────────┘"
