name: Telegram Single Downloader (Robust)

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: '🔗 لینک پست تلگرام (فقط یک لینک)'
        required: true
        type: string
      split_threshold_mb:
        description: '📦 حداکثر حجم هر قطعه (مگابایت) - 0 یعنی تقسیم نشود'
        required: false
        type: number
        default: 90
      proxy_count:
        description: '🔢 تعداد پروکسی سالم ذخیره شود'
        required: false
        type: number
        default: 5

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📂 دریافت مخزن
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚡ نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq zip unzip bc aria2 p7zip-full

      # ──────────────────────────────────────────────
      #  کش پروکسی‌ها با actions/cache
      # ──────────────────────────────────────────────
      - name: 💾 بازیابی کش پروکسی‌ها
        id: cache-proxies
        uses: actions/cache@v4
        with:
          path: .proxy_cache
          key: proxies-v1-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            proxies-v1-

      # ──────────────────────────────────────────────
      #  کشف و تأیید پروکسی‌های سالم (با تست دانلود)
      # ──────────────────────────────────────────────
      - name: 🔍 کشف پروکسی‌های قوی
        id: discover
        run: |
          mkdir -p .proxy_cache
          PROXY_FILE=".proxy_cache/alive_proxies.txt"
          NEEDED=${{ github.event.inputs.proxy_count }}
          FOUND=0
          declare -a ALIVE=()

          # 1) تست اتصال مستقیم
          echo "══════════════════════════════════════════════"
          echo "🌐 تست اتصال مستقیم (DIRECT)"
          echo "══════════════════════════════════════════════"
          if curl -s --max-time 10 --connect-timeout 5 \
            'https://telegramdownloader.net/proxy.php' \
            -X POST -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-raw 'telegram_link=https%3A%2F%2Ft.me%2Ftest' --compressed 2>/dev/null | grep -q '"success"'; then
            echo "✅ اتصال مستقیم پاسخ داد – اولویت اول"
            ALIVE+=("DIRECT")
            FOUND=1
          else
            echo "⚠️ اتصال مستقیم در دسترس نیست"
          fi

          # 2) اگر پروکسی کش شده داریم تست کنیم
          if [ -f "$PROXY_FILE" ]; then
            echo "🔄 بررسی پروکسی‌های کش‌شده..."
            while IFS= read -r proxy; do
              [ -z "$proxy" ] && continue
              echo -n "  ▪ تست $proxy ... "
              if curl -s -x "http://$proxy" --max-time 10 --connect-timeout 5 \
                'https://telegramdownloader.net/proxy.php' \
                -X POST -H 'Content-Type: application/x-www-form-urlencoded' \
                --data-raw 'telegram_link=https%3A%2F%2Ft.me%2Ftest' --compressed 2>/dev/null | grep -q '"success"'; then
                echo "✅"
                ALIVE+=("$proxy")
                FOUND=$((FOUND+1))
                [ $FOUND -ge $NEEDED ] && break
              else
                echo "❌"
              fi
            done < "$PROXY_FILE"
          fi

          # 3) اگر هنوز به تعداد نیاز داریم، لیست جدید بگیریم و تست کنیم
          if [ $FOUND -lt $NEEDED ]; then
            echo "📥 دریافت لیست پروکسی جدید..."
            curl -s --max-time 15 'https://raw.githubusercontent.com/Ian-Lusule/Proxies/main/proxies/http.txt' \
              | grep -vE '^(0\.0\.0\.0|127\.0\.0\.1)' | head -1000 > proxy_list.txt

            echo "⚡ تست همزمان پروکسی‌ها (هر کدام ۸ ثانیه فرصت)..."
            # تست موازی با ۱۰ نخ، هر کدام ۸ ثانیه timeout
            cat proxy_list.txt | xargs -P 10 -I {} bash -c '
              proxy="{}"
              if curl -s -x "http://$proxy" --max-time 8 --connect-timeout 4 --retry 0 -k \
                "https://telegramdownloader.net/proxy.php" \
                -X POST -H "Content-Type: application/x-www-form-urlencoded" \
                --data-raw "telegram_link=https%3A%2F%2Ft.me%2Ftest" --compressed 2>/dev/null | grep -q "\"success\""; then
                echo "$proxy" >> found_proxies.txt
              fi
            ' 2>/dev/null

            if [ -f found_proxies.txt ]; then
              while IFS= read -r proxy; do
                if [ $FOUND -lt $NEEDED ]; then
                  echo "✅ پروکسی زنده: $proxy"
                  ALIVE+=("$proxy")
                  FOUND=$((FOUND+1))
                else
                  break
                fi
              done < found_proxies.txt
              rm found_proxies.txt
            fi
          fi

          # 4) تست عملی دانلود یک فایل کوچک با هر پروکسی (تضمین کیفیت)
          echo "══════════════════════════════════════════════"
          echo "🔬 تست دانلود واقعی با پروکسی‌های منتخب"
          echo "══════════════════════════════════════════════"
          FINAL_PROXIES=()
          for proxy in "${ALIVE[@]}"; do
            echo -n "  🧪 $proxy : دریافت لینک تست..."
            if [ "$proxy" = "DIRECT" ]; then
              RESP=$(curl -s --max-time 15 -X POST \
                -H 'Content-Type: application/x-www-form-urlencoded' \
                --data-raw 'telegram_link=https%3A%2F%2Ft.me%2Ftest' \
                --compressed https://telegramdownloader.net/proxy.php)
            else
              RESP=$(curl -s -x "http://$proxy" --max-time 15 -X POST \
                -H 'Content-Type: application/x-www-form-urlencoded' \
                --data-raw 'telegram_link=https%3A%2F%2Ft.me%2Ftest' \
                --compressed https://telegramdownloader.net/proxy.php)
            fi
            TEST_URL=$(echo "$RESP" | jq -r '.data.data.link')
            if [ -z "$TEST_URL" ] || [ "$TEST_URL" = "null" ]; then
              echo "⛔ لینک تست دریافت نشد"
              continue
            fi
            echo -n " | دانلود ۵۱۲ کیلوبایت..."
            if [ "$proxy" = "DIRECT" ]; then
              aria2c --max-connection-per-server=1 --split=1 --max-tries=2 --timeout=15 \
                --connect-timeout=10 --allow-overwrite=true --quiet \
                --dir=/tmp --out="test_$RANDOM" "$TEST_URL" --max-download-limit=512K --stop-with-process=512K 2>/dev/null
            else
              aria2c --max-connection-per-server=1 --split=1 --max-tries=2 --timeout=15 \
                --connect-timeout=10 --allow-overwrite=true --quiet \
                --all-proxy="http://$proxy" --dir=/tmp --out="test_$RANDOM" "$TEST_URL" \
                --max-download-limit=512K --stop-with-process=512K 2>/dev/null
            fi
            if [ $? -eq 0 ]; then
              echo " ✅"
              FINAL_PROXIES+=("$proxy")
            else
              echo " ❌"
            fi
          done

          # اگر پروکسی قابل‌قبولی نماند، DIRECT را امتحان می‌کنیم (حتی اگر در تست اول رد شد)
          if [ ${#FINAL_PROXIES[@]} -eq 0 ]; then
            echo "⚠️ هیچ پروکسی تست دانلود را رد نکرد. استفاده از DIRECT به‌عنوان آخرین راه"
            FINAL_PROXIES=("DIRECT")
          fi

          printf "%s\n" "${FINAL_PROXIES[@]}" > "$PROXY_FILE"
          echo "🎯 پروکسی‌های نهایی (${#FINAL_PROXIES[@]} عدد):"
          cat "$PROXY_FILE"
          echo "proxy_file=$PROXY_FILE" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────────────
      #  دانلود اصلی با گردش روی پروکسی‌ها
      # ──────────────────────────────────────────────
      - name: 📥 دانلود هوشمند فایل
        id: download
        run: |
          LINK="${{ github.event.inputs.telegram_link }}"
          PROXY_FILE="${{ steps.discover.outputs.proxy_file }}"
          THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          mkdir -p downloads logs

          # توابع کمکی
          fix_url() { echo "$1" | sed 's/ /-/g; s/%20/-/g'; }
          safe_folder() { echo "$1" | sed 's/[<>:"|?*\\/@#\$%^&!~`+=;,.]/_/g; s/ /_/g; s/__*/_/g' | cut -c1-80; }
          sanitize_name() { echo "$1" | sed 's/%20/-/g; s/%40/@/g; s/[[:space:]]/-/g; s/--*/-/g; s/[^a-zA-Z0-9.@_-]//g'; }
          urlencode() { python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }

          mapfile -t PROXIES < "$PROXY_FILE"
          SUCCESS=0
          ATTEMPT=0

          for PROXY in "${PROXIES[@]}"; do
            ATTEMPT=$((ATTEMPT + 1))
            echo ""
            echo "══════════════════════════════════════════════"
            echo "🔄 تلاش $ATTEMPT با پروکسی: $PROXY"
            echo "══════════════════════════════════════════════"

            # 1) دریافت لینک دانلود
            echo "⚡ دریافت اطلاعات فایل..."
            if [ "$PROXY" = "DIRECT" ]; then
              RESPONSE=$(curl -s --max-time 20 --connect-timeout 10 -X POST \
                -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' \
                -H 'Content-Type: application/x-www-form-urlencoded' \
                --data-raw "telegram_link=$LINK" --compressed \
                https://telegramdownloader.net/proxy.php)
            else
              RESPONSE=$(curl -s -x "http://$PROXY" --max-time 20 --connect-timeout 10 -X POST \
                -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' \
                -H 'Content-Type: application/x-www-form-urlencoded' \
                --data-raw "telegram_link=$LINK" --compressed \
                https://telegramdownloader.net/proxy.php)
            fi

            RAW_URL=$(echo "$RESPONSE" | jq -r '.data.data.link')
            ORIGINAL_NAME=$(echo "$RESPONSE" | jq -r '.data.data.file_name')

            if [ -z "$RAW_URL" ] || [ "$RAW_URL" = "null" ]; then
              echo "❌ دریافت لینک ناموفق - پروکسی بعدی"
              continue
            fi

            echo "📄 نام فایل: $ORIGINAL_NAME"
            echo "🔗 لینک مستقیم دریافت شد"

            CLEAN_NAME=$(sanitize_name "$ORIGINAL_NAME")
            FOLDER_NAME=$(safe_folder "${CLEAN_NAME%.*}")
            DOWNLOAD_DIR="downloads/$FOLDER_NAME"
            mkdir -p "$DOWNLOAD_DIR"
            FIXED_URL=$(fix_url "$RAW_URL")

            # 2) دانلود فایل با aria2c
            echo "📥 شروع دانلود..."
            ARIA2_OPTS=(--max-connection-per-server=8 --split=8 --min-split-size=10M
                        --max-tries=5 --retry-wait=5 --timeout=120 --connect-timeout=30
                        --allow-overwrite=true --auto-file-renaming=false
                        --console-log-level=notice --summary-interval=5
                        --dir="$DOWNLOAD_DIR" --out="$ORIGINAL_NAME")

            if [ "$PROXY" != "DIRECT" ]; then
              ARIA2_OPTS+=(--all-proxy="http://$PROXY")
            fi

            aria2c "${ARIA2_OPTS[@]}" "$FIXED_URL"
            ARIA_EXIT=$?

            if [ $ARIA_EXIT -ne 0 ]; then
              echo "❌ aria2c با کد $ARIA_EXIT شکست خورد - پروکسی بعدی"
              rm -f "$DOWNLOAD_DIR/$ORIGINAL_NAME"
              continue
            fi

            # 3) بررسی حجم فایل
            if [ "$ORIGINAL_NAME" != "$CLEAN_NAME" ]; then
              mv "$DOWNLOAD_DIR/$ORIGINAL_NAME" "$DOWNLOAD_DIR/$CLEAN_NAME"
            fi

            FILE_SIZE=$(stat -c%s "$DOWNLOAD_DIR/$CLEAN_NAME")
            if [ "$FILE_SIZE" -lt 10000 ]; then
              echo "❌ فایل دریافت‌شده بسیار کوچک است (${FILE_SIZE} بایت) - پروکسی بعدی"
              rm -f "$DOWNLOAD_DIR/$CLEAN_NAME"
              continue
            fi

            SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            echo "✅ دانلود موفق! حجم: ${SIZE_MB} مگابایت"
            SUCCESS=1
            break
          done

          if [ $SUCCESS -eq 0 ]; then
            echo "⛔ تمام پروکسی‌ها شکست خوردند!"
            exit 1
          fi

          # ── تقسیم فایل با 7z در صورت نیاز ──
          SPLIT_FILES=()
          LIMIT=$((THRESHOLD_MB * 1024 * 1024))
          if [ "$FILE_SIZE" -gt "$LIMIT" ] && [ "$THRESHOLD_MB" != "0" ]; then
            echo "✂️ تقسیم فایل به قطعات ${THRESHOLD_MB}مگی با 7z..."
            ARCHIVE="${CLEAN_NAME}.7z"
            7z a -v${THRESHOLD_MB}m "$DOWNLOAD_DIR/$ARCHIVE" "$DOWNLOAD_DIR/$CLEAN_NAME" >/dev/null
            if [ $? -eq 0 ]; then
              rm -f "$DOWNLOAD_DIR/$CLEAN_NAME"
              # جمع‌آوری قطعات
              for part in "$DOWNLOAD_DIR/$ARCHIVE".*; do
                [ -f "$part" ] && SPLIT_FILES+=("$(basename "$part")")
              done
              if [ ${#SPLIT_FILES[@]} -eq 0 ] && [ -f "$DOWNLOAD_DIR/$ARCHIVE" ]; then
                SPLIT_FILES+=("$ARCHIVE")
              fi
              echo "📦 تعداد قطعات: ${#SPLIT_FILES[@]}"
            else
              echo "⚠️ خطا در ساخت 7z، فایل اصلی باقی می‌ماند."
              SPLIT_FILES=("$CLEAN_NAME")
            fi
          else
            SPLIT_FILES=("$CLEAN_NAME")
          fi

          # ── ساخت فایل لینک‌های گیت‌هاب ──
          GITHUB_LINKS_FILE="$DOWNLOAD_DIR/github_links.txt"
          ENCODED_FOLDER=$(urlencode "$FOLDER_NAME")
          > "$GITHUB_LINKS_FILE"
          for file in "${SPLIT_FILES[@]}"; do
            ENCODED_FILE=$(urlencode "$file")
            echo "https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/refs/heads/${BRANCH}/downloads/${ENCODED_FOLDER}/${ENCODED_FILE}" >> "$GITHUB_LINKS_FILE"
          done

          echo "📝 لینک‌های دانلود در github_links.txt ذخیره شدند."
          cat "$GITHUB_LINKS_FILE"
          echo "download_folder=$DOWNLOAD_DIR" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────────────
      #  انتشار فایل‌ها در مخزن
      # ──────────────────────────────────────────────
      - name: 📤 انتشار در ریپازیتوری
        if: success()
        run: |
          git config user.name "Telegram-Downloader-Bot"
          git config user.email "bot@telegram.dl"
          git fetch origin "${{ github.ref_name }}"
          git pull origin "${{ github.ref_name }}" --rebase || true
          git add downloads/ .proxy_cache/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "✅ بدون تغییر جدید"
            exit 0
          fi
          git commit -m "📥 فایل دانلودشده از تلگرام [skip ci]"
          for i in 1 2 3; do
            if git push origin "${{ github.ref_name }}"; then
              echo "✅ انتشار موفق"
              break
            else
              echo "⚠️ تلاش $i ناموفق، در حال rebase..."
              git pull origin "${{ github.ref_name }}" --rebase
              sleep 5
            fi
          done

      # ──────────────────────────────────────────────
      #  گزارش نهایی
      # ──────────────────────────────────────────────
      - name: 📋 خلاصه عملیات
        if: always()
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│         📊 گزارش دانلود هوشمند              │"
          echo "├─────────────────────────────────────────────┤"
          echo "│ لینک: ${{ github.event.inputs.telegram_link }}"
          echo "│ پوشه مقصد: ${{ steps.download.outputs.download_folder }}"
          echo "│ فایل‌های نهایی:"
          ls -lh ${{ steps.download.outputs.download_folder }}/ 2>/dev/null | tail -n +2
          echo "└─────────────────────────────────────────────┘"
